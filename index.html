<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>读书卡片生成器 ✨</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/color-thief-ts@2.0.1/dist/color-thief.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-purple-100 to-pink-100 min-h-screen">
  <div class="container mx-auto px-4 py-8 max-w-7xl">
    <!-- 标题 -->
    <div class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-purple-600 to-pink-500 bg-clip-text text-transparent mb-2">
        读书卡片生成器
      </h1>
      <p class="text-gray-600 text-lg">输入书名信息，一键生成小红书风格读书卡片 📚</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- 左侧：表单区 -->
      <div class="lg:col-span-4">
        <div class="bg-white rounded-3xl shadow-xl p-6">
          <form id="generatorForm">
            <div class="mb-5">
              <label class="block text-gray-700 font-semibold mb-2" for="bookTitle">书名 *</label>
              <input type="text" id="bookTitle" required
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                placeholder="例如：变老又怎样">
            </div>

            <div class="mb-5">
              <label class="block text-gray-700 font-semibold mb-2" for="bookSubtitle">副标题 *</label>
              <input type="text" id="bookSubtitle" required
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                placeholder="例如：五十岁后才有趣的五十件事">
            </div>

            <div class="mb-5">
              <label class="block text-gray-700 font-semibold mb-2" for="author">作者 *</label>
              <input type="text" id="author" required
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                placeholder="例如：[德]安德烈娅·格尔克">
            </div>

            <div class="mb-5">
              <label class="block text-gray-700 font-semibold mb-2" for="coverImage">封面图片 *</label>
              <input type="file" id="coverImage" accept="image/*" required
                class="w-full px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition">
              <div id="coverPreview" class="hidden mt-3">
                <p class="text-sm text-gray-500 mb-2">预览：</p>
                <img id="previewImg" class="max-h-32 rounded-lg shadow">
              </div>
            </div>

            <!-- 进度显示 -->
            <div id="progressContainer" class="mb-5 hidden">
              <div class="bg-gray-100 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-gradient-to-r from-purple-500 to-pink-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
              </div>
              <p id="progressText" class="text-sm text-gray-500 mt-2">正在搜索...</p>
            </div>

            <button type="submit" id="generateBtn"
              class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-500 text-white font-semibold rounded-xl hover:from-purple-700 hover:to-pink-600 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg">
              生成书卡
            </button>
          </form>

          <!-- 重新生成配色 -->
          <div id="regenerateContainer" class="mt-4 hidden">
            <div class="border-t border-gray-200 pt-4">
              <p class="text-sm text-gray-500 mb-3">对配色不满意？可以重新生成 (<span id="remainingRetries">3</span> 次剩余)</p>
              <button id="regenerateBtn"
                class="w-full py-3 bg-white border-2 border-purple-500 text-purple-600 font-semibold rounded-xl hover:bg-purple-50 transition-all">
                重新生成配色
              </button>
            </div>
          </div>

          <div class="mt-5 pt-4 border-t border-gray-200">
            <p class="text-xs text-gray-400 text-center">
              自动搜索封面 • AI生成内容 • 一键下载图片
            </p>
          </div>
        </div>
      </div>

      <!-- 右侧：预览区 -->
      <div class="lg:col-span-8">
        <div class="bg-white rounded-3xl shadow-xl p-6">
          <h2 class="text-2xl font-bold text-gray-800 mb-6">预览与下载</h2>

          <!-- 占位提示 -->
          <div id="placeholderArea" class="text-center py-16 text-gray-400">
            <div class="text-8xl mb-4">📚</div>
            <p class="text-xl">填写信息后在此预览生成的书卡</p>
            <p class="text-sm mt-2">两张卡片 · 750×1000px · 直接下载</p>
          </div>

          <!-- 预览区域 -->
          <div id="previewArea" class="hidden">
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
              <!-- 信息卡 -->
              <div>
                <p class="text-center font-semibold text-gray-700 mb-3">书籍信息卡</p>
                <div id="infoCardContainer" class="flex justify-center"></div>
                <button id="downloadInfoBtn" class="w-full mt-3 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition font-medium">
                  下载信息卡
                </button>
              </div>
              <!-- 金句卡 -->
              <div>
                <p class="text-center font-semibold text-gray-700 mb-3">金句感悟卡</p>
                <div id="quoteCardContainer" class="flex justify-center"></div>
                <button id="downloadQuoteBtn" class="w-full mt-3 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition font-medium">
                  下载金句卡
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 隐藏模板容器，用于渲染导出 -->
  <div id="exportTemplates" class="hidden">
    <div id="infoCardTemplate" class="book-card"></div>
    <div id="quoteCardTemplate" class="book-card"></div>
  </div>

  <script src="book-search.js"></script>
  <script src="color-generator.js"></script>
  <script src="content-generator.js"></script>
  <script src="templates.js"></script>
  <script src="export.js"></script>
  <script src="app.js"></script>
</body>
</html>
